<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
    <title>Document</title>
</head>
<body>
    <div class="graphics">
        <figure>
            <img src="" alt="" class="background-image">
            <figcaption></figcaption>
        </figure>
        <div class="logo">
            <img src="" alt="" class="logo-image">
            <p class="logo-text"></p>
        </div>
    </div>
    <div class="content">
        <p class="cta">

        </p>
        <div class="form-content">
            <p class="form-header"></p>
            <form action="" method="POST" id="sign-up-form">
                <label for="first-name">First Name</label>
                <input type="text" name="first-name" id="first-name">
                <label for="last-name">Last Name</label>
                <input type="text" name="last-name" id="last-name">
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
                <label for="phone-number">Phone Number</label>
                <input type="tel" name="phone-number" id="phone-number">
                <label for="password">Password</label>
                <input type="password" name="password" id="password">
                <label for="password-confirm">Confirm Password</label>
                <input type="password" name="password-confirm" id="password-confirm">
            </form>
        </div>
        <button class="form-button" type="submit" form="sign-up-form">Create Account</button>
        <p class="login-link"></p>
    </div>
</body>
</html>
